{% extends 'base.html' %}

{% block title %}Create Group — ChatApp{% endblock %}

{% block extra_css %}
<style>
.create-wrap {
    max-width: 520px; margin: 24px auto 60px;
}
.create-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border2);
    border-radius: 18px;
    padding: 32px;
    box-shadow: var(--shadow-md);
}
.create-title { font-size: 21px; font-weight: 700; color: var(--text1); margin-bottom: 6px; }
.create-sub   { font-size: 13.5px; color: var(--text3); margin-bottom: 28px; }

.field-group { margin-bottom: 18px; }
.field-label {
    display: block; font-size: 11.5px; font-weight: 600;
    color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px;
}
.field-input,
.field-textarea {
    width: 100%;
    background: var(--bg-hover); border: 1.5px solid var(--border2);
    border-radius: 10px; padding: 10px 14px;
    color: var(--text1); font-size: 14px; outline: none;
    transition: border-color 150ms, box-shadow 150ms; font-family: inherit;
}
.field-textarea { resize: none; }
.field-input:focus, .field-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
}
.field-input::placeholder, .field-textarea::placeholder { color: var(--text3); }

/* Privacy toggle row */
.privacy-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-hover); border: 1.5px solid var(--border2);
    border-radius: 10px; padding: 13px 16px;
    cursor: pointer;
    transition: border-color 150ms;
}
.privacy-row:has(input:checked) { border-color: var(--accent); }
.privacy-label { display: flex; flex-direction: column; gap: 2px; cursor: pointer; }
.privacy-title { font-size: 14px; font-weight: 600; color: var(--text1); }
.privacy-desc  { font-size: 12px; color: var(--text3); }
.form-check-input[type=checkbox] { cursor: pointer; width: 20px; height: 20px; }

.btn-create {
    width: 100%; padding: 12px 20px;
    background: var(--accent); color: #fff;
    font-size: 14.5px; font-weight: 700;
    border: none; border-radius: 10px; cursor: pointer;
    transition: background 150ms, transform 100ms; font-family: inherit;
    margin-top: 6px;
}
.btn-create:hover { background: var(--accent-hover); transform: translateY(-1px); }

.btn-cancel {
    display: block; text-align: center; margin-top: 12px;
    font-size: 13.5px; color: var(--text3); text-decoration: none;
}
.btn-cancel:hover { color: var(--text2); }
</style>
{% endblock %}

{% block content %}
<div class="create-wrap">
    <div class="create-card">
        <h2 class="create-title">Create a Group</h2>
        <p class="create-sub">Set up a chat space for your team, friends, or community.</p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="field-group">
                <label class="field-label" for="groupName">Group Name *</label>
                <input type="text" id="groupName" name="name" class="field-input"
                       required maxlength="255" placeholder="e.g. Dev Team, Friends…">
            </div>

            <div class="field-group">
                <label class="field-label" for="groupDesc">Description</label>
                <textarea id="groupDesc" name="description" class="field-textarea"
                          rows="3" maxlength="500" placeholder="What is this group about?"></textarea>
            </div>

            <div class="field-group">
                <label class="field-label" for="groupImage">Group Photo</label>
                <input type="file" id="groupImage" name="image" class="field-input"
                       accept="image/*" style="padding: 8px 14px; cursor: pointer;">
            </div>

            <div class="field-group">
                <label class="privacy-row" for="isPrivate">
                    <span class="privacy-label">
                        <span class="privacy-title">🔒 Private Group</span>
                        <span class="privacy-desc">Only people with the access code can join</span>
                    </span>
                    <input type="checkbox" class="form-check-input" id="isPrivate" name="is_private">
                </label>
            </div>

            <button type="submit" class="btn-create">Create Group</button>
            <a href="{% url 'group_list' %}" class="btn-cancel">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
