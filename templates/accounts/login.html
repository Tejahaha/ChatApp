{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - ChatApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="glass-card p-5">
            <h2 class="fw-bold mb-4 text-center">Welcome Back</h2>
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid mb-3 mt-4">
                    <button type="submit" class="btn btn-primary rounded-pill py-2 fw-bold">Login</button>
                </div>
                <p class="text-center small text-muted">
                    Don't have an account? <a href="{% url 'register' %}" class="text-primary text-decoration-none fw-semibold">Register here</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
