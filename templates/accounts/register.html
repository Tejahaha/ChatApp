{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register - ChatApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card p-5">
            <h2 class="fw-bold mb-4 text-center">Create Account</h2>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid mb-3 mt-4">
                    <button type="submit" class="btn btn-primary rounded-pill py-2 fw-bold">Register</button>
                </div>
                <p class="text-center small text-muted">
                    Already have an account? <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-semibold">Login here</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
